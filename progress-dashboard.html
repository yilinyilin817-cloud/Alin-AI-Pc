<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 伴侣 · 项目进度监控</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --bg-card: #1a1f2e;
      --accent-cyan: #00f5ff;
      --accent-purple: #b14eff;
      --accent-pink: #ff006e;
      --accent-green: #00ff88;
      --accent-orange: #ff8800;
      --text-primary: #ffffff;
      --text-secondary: #a0aec0;
      --text-muted: #64748b;
      --border: rgba(255, 255, 255, 0.08);
      --glow-cyan: 0 0 20px rgba(0, 245, 255, 0.3);
      --glow-purple: 0 0 20px rgba(177, 78, 255, 0.3);
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* 动态粒子背景 */
    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.4;
    }

    /* 网格背景 */
    .grid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 1;
      pointer-events: none;
    }

    /* 扫描线效果 */
    .scan-line {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
      animation: scan 8s linear infinite;
      z-index: 2;
      pointer-events: none;
      opacity: 0.5;
    }

    @keyframes scan {
      0% { transform: translateY(-100vh); }
      100% { transform: translateY(100vh); }
    }

    /* 主容器 */
    .container {
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* 头部区域 */
    .hero {
      text-align: center;
      margin-bottom: 80px;
      animation: fadeInUp 1s ease-out;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(0, 245, 255, 0.1);
      border: 1px solid rgba(0, 245, 255, 0.3);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent-cyan);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 24px;
      animation: pulse-glow 2s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 10px rgba(0, 245, 255, 0.2); }
      50% { box-shadow: 0 0 20px rgba(0, 245, 255, 0.4); }
    }

    .hero-title {
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 700;
      line-height: 1;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-purple) 50%, var(--accent-pink) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient-shift 5s ease infinite;
    }

    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .hero-subtitle {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 40px;
    }

    /* 总进度环 */
    .progress-ring-container {
      display: flex;
      justify-content: center;
      margin-bottom: 40px;
    }

    .progress-ring {
      position: relative;
      width: 200px;
      height: 200px;
    }

    .progress-ring svg {
      transform: rotate(-90deg);
    }

    .progress-ring circle {
      fill: none;
      stroke-width: 8;
    }

    .progress-ring .bg {
      stroke: rgba(255, 255, 255, 0.05);
    }

    .progress-ring .progress {
      stroke: url(#gradient);
      stroke-linecap: round;
      stroke-dasharray: 565.48;
      stroke-dashoffset: 565.48;
      transition: stroke-dashoffset 2s ease-out;
      filter: drop-shadow(0 0 10px rgba(0, 245, 255, 0.5));
    }

    .progress-ring .value {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .progress-ring .value .number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 48px;
      font-weight: 700;
      color: var(--accent-cyan);
      text-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
    }

    .progress-ring .value .label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 60px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      border-color: rgba(0, 245, 255, 0.3);
      box-shadow: var(--glow-cyan);
    }

    .stat-card:hover::before {
      transform: scaleX(1);
    }

    .stat-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 36px;
      font-weight: 700;
      color: var(--accent-cyan);
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* 模块区域 */
    .section {
      margin-bottom: 60px;
      animation: fadeInUp 0.8s ease-out;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .section-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .section-title {
      font-size: 24px;
      font-weight: 600;
    }

    .section-count {
      margin-left: auto;
      padding: 4px 12px;
      background: rgba(0, 245, 255, 0.1);
      border: 1px solid rgba(0, 245, 255, 0.3);
      border-radius: 100px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--accent-cyan);
    }

    /* 模块卡片 */
    .modules-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .module-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .module-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.05), rgba(177, 78, 255, 0.05));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .module-card:hover {
      transform: translateY(-2px);
      border-color: rgba(0, 245, 255, 0.3);
      box-shadow: var(--glow-cyan);
    }

    .module-card:hover::after {
      opacity: 1;
    }

    .module-card > * {
      position: relative;
      z-index: 1;
    }

    .module-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .module-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: rgba(0, 245, 255, 0.1);
    }

    .module-name {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
    }

    .module-status {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 10px var(--accent-green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }

    .module-path {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .module-files {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .file-tag {
      padding: 4px 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-secondary);
      transition: all 0.2s ease;
    }

    .module-card:hover .file-tag {
      background: rgba(0, 245, 255, 0.1);
      color: var(--accent-cyan);
    }

    /* 功能清单 */
    .features-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: all 0.3s ease;
    }

    .feature-item:hover {
      border-color: rgba(0, 245, 255, 0.3);
      transform: translateX(4px);
    }

    .feature-check {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .feature-check.complete {
      background: rgba(0, 255, 136, 0.2);
      color: var(--accent-green);
      box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
    }

    .feature-check.placeholder {
      background: rgba(255, 136, 0, 0.2);
      color: var(--accent-orange);
      box-shadow: 0 0 10px rgba(255, 136, 0, 0.3);
    }

    .feature-info {
      flex: 1;
    }

    .feature-name {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .feature-desc {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* 页脚 */
    .footer {
      text-align: center;
      padding: 40px 0;
      border-top: 1px solid var(--border);
      margin-top: 60px;
    }

    .footer-text {
      font-size: 14px;
      color: var(--text-muted);
    }

    .footer-time {
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent-cyan);
    }

    /* 动画 */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeInUp 0.8s ease-out;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .container {
        padding: 20px 16px;
      }

      .hero {
        margin-bottom: 40px;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .modules-grid,
      .features-list {
        grid-template-columns: 1fr;
      }
    }

    /* 滚动条样式 */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 245, 255, 0.3);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 245, 255, 0.5);
    }
  </style>
</head>
<body>
  <canvas id="particles-canvas"></canvas>
  <div class="grid-bg"></div>
  <div class="scan-line"></div>

  <div class="container">
    <!-- 头部 -->
    <section class="hero">
      <div class="hero-badge">
        <span>●</span>
        <span>实时监控中</span>
      </div>
      <h1 class="hero-title">AI 伴侣</h1>
      <p class="hero-subtitle">全本地化多模态桌面应用 · 项目进度追踪</p>
      
      <!-- 总进度环 -->
      <div class="progress-ring-container">
        <div class="progress-ring">
          <svg width="200" height="200">
            <defs>
              <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="var(--accent-cyan)" />
                <stop offset="50%" stop-color="var(--accent-purple)" />
                <stop offset="100%" stop-color="var(--accent-pink)" />
              </linearGradient>
            </defs>
            <circle class="bg" cx="100" cy="100" r="90" />
            <circle class="progress" cx="100" cy="100" r="90" id="progress-circle" />
          </svg>
          <div class="value">
            <div class="number" id="progress-number">0</div>
            <div class="label">完成度</div>
          </div>
        </div>
      </div>
    </section>

    <!-- 统计卡片 -->
    <section class="stats-grid" id="stats-grid">
      <!-- 动态生成 -->
    </section>

    <!-- Rust 后端模块 -->
    <section class="section" id="rust-section">
      <div class="section-header">
        <div class="section-icon" style="background: linear-gradient(135deg, #ce422b, #f74c00);">🦀</div>
        <h2 class="section-title">Rust 后端核心</h2>
        <span class="section-count" id="rust-count">0 模块</span>
      </div>
      <div class="modules-grid" id="rust-modules">
        <!-- 动态生成 -->
      </div>
    </section>

    <!-- Vue 前端模块 -->
    <section class="section" id="vue-section">
      <div class="section-header">
        <div class="section-icon" style="background: linear-gradient(135deg, #42b883, #35495e);">💚</div>
        <h2 class="section-title">Vue 3 前端</h2>
        <span class="section-count" id="vue-count">0 组件</span>
      </div>
      <div class="modules-grid" id="vue-modules">
        <!-- 动态生成 -->
      </div>
    </section>

    <!-- Python Workers -->
    <section class="section" id="python-section">
      <div class="section-header">
        <div class="section-icon" style="background: linear-gradient(135deg, #3776ab, #ffd43b);">🐍</div>
        <h2 class="section-title">Python Workers</h2>
        <span class="section-count" id="python-count">0 服务</span>
      </div>
      <div class="modules-grid" id="python-modules">
        <!-- 动态生成 -->
      </div>
    </section>

    <!-- 功能清单 -->
    <section class="section" id="features-section">
      <div class="section-header">
        <div class="section-icon" style="background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));">✨</div>
        <h2 class="section-title">功能实现状态</h2>
        <span class="section-count" id="features-count">0 / 0</span>
      </div>
      <div class="features-list" id="features-list">
        <!-- 动态生成 -->
      </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
      <p class="footer-text">
        最后扫描: <span class="footer-time" id="scan-time">--</span>
      </p>
    </footer>
  </div>

  <script>
    // 粒子背景动画
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.radius = Math.random() * 2 + 1;
        this.opacity = Math.random() * 0.5 + 0.2;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0, 245, 255, ${this.opacity})`;
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      const count = Math.min(100, Math.floor((canvas.width * canvas.height) / 15000));
      for (let i = 0; i < count; i++) {
        particles.push(new Particle());
      }
    }

    function drawConnections() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < 150) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(0, 245, 255, ${0.1 * (1 - distance / 150)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      particles.forEach(p => {
        p.update();
        p.draw();
      });

      drawConnections();
      requestAnimationFrame(animate);
    }

    resizeCanvas();
    initParticles();
    animate();

    window.addEventListener('resize', () => {
      resizeCanvas();
      initParticles();
    });

    // 数据加载
    let progressData = null;

    async function loadData() {
      try {
        const response = await fetch('progress-report.json');
        progressData = await response.json();
        renderDashboard();
      } catch (error) {
        console.error('加载数据失败:', error);
        // 使用模拟数据
        progressData = getMockData();
        renderDashboard();
      }
    }

    function getMockData() {
      return {
        scan_time: new Date().toISOString(),
        overall_progress: 95,
        statistics: {
          rust_modules: 11,
          vue_components: 18,
          python_workers: 8,
          ipc_commands: 38,
          skills: 4
        },
        modules: {
          rust: {
            name: "Rust 后端核心",
            icon: "🦀",
            path: "src-tauri/src/",
            modules: [
              { name: "commands", files: ["chat.rs", "persona.rs", "skill.rs", "model.rs", "voice.rs"], status: "complete" },
              { name: "orchestrator", files: ["pipeline.rs", "mod.rs"], status: "complete" },
              { name: "model_bus", files: ["provider.rs", "ollama.rs", "scheduler.rs"], status: "complete" },
              { name: "memory", files: ["long_term.rs", "short_term.rs", "event_extractor.rs"], status: "complete" },
              { name: "emotion", files: ["fusion.rs", "text_emotion.rs", "voice_emotion.rs"], status: "complete" },
              { name: "rag", files: ["indexer.rs", "retriever.rs"], status: "complete" },
              { name: "skill", files: ["registry.rs", "executor.rs", "schema_validator.rs"], status: "complete" },
              { name: "perception", files: ["screen.rs", "camera.rs", "audio_io.rs"], status: "complete" },
              { name: "storage", files: ["repo.rs", "models.rs"], status: "complete" },
              { name: "vector", files: ["store.rs", "sqlite_vec.rs", "qdrant.rs"], status: "complete" },
              { name: "worker", files: ["pool.rs", "ipc.rs", "spawn.rs"], status: "complete" }
            ]
          },
          vue: {
            name: "Vue 3 前端",
            icon: "💚",
            path: "src/",
            modules: [
              { name: "Chat", files: ["Chat.vue"], status: "complete" },
              { name: "PersonaEditor", files: ["PersonaEditor.vue"], status: "complete" },
              { name: "KnowledgeBase", files: ["KnowledgeBase.vue"], status: "complete" },
              { name: "SkillMarket", files: ["SkillMarket.vue"], status: "complete" },
              { name: "ModelCenter", files: ["ModelCenter.vue"], status: "complete" },
              { name: "Settings", files: ["Settings.vue"], status: "complete" },
              { name: "ChatBubble", files: ["ChatBubble.vue"], status: "complete" },
              { name: "ChatInput", files: ["ChatInput.vue"], status: "complete" },
              { name: "VoiceVisualizer", files: ["VoiceVisualizer.vue"], status: "complete" },
              { name: "EmotionIndicator", files: ["EmotionIndicator.vue"], status: "complete" },
              { name: "ModelViewer3D", files: ["ModelViewer3D.vue"], status: "complete" },
              { name: "Live2DCanvas", files: ["Live2DCanvas.vue"], status: "placeholder" }
            ]
          },
          python: {
            name: "Python Workers",
            icon: "🐍",
            path: "workers/",
            modules: [
              { name: "llm_worker", files: ["llm_worker.py"], status: "complete" },
              { name: "asr_worker", files: ["asr_worker.py"], status: "complete" },
              { name: "tts_worker", files: ["tts_worker.py"], status: "complete" },
              { name: "embedding_worker", files: ["embedding_worker.py"], status: "complete" },
              { name: "vad_worker", files: ["vad_worker.py"], status: "complete" },
              { name: "emotion_worker", files: ["emotion_worker.py"], status: "complete" },
              { name: "protocol", files: ["protocol.py"], status: "complete" },
              { name: "download_models", files: ["download_models.py"], status: "complete" }
            ]
          }
        },
        features: [
          { name: "Gemma 4 多模态 LLM", description: "Ollama + llama.cpp 双后端", status: "complete" },
          { name: "Qwen3-VL 备选", description: "中文优先场景切换", status: "complete" },
          { name: "ASR 语音识别", description: "faster-whisper 实时转录", status: "complete" },
          { name: "TTS 语音合成", description: "CosyVoice 情感语音", status: "complete" },
          { name: "语音 VAD 打断", description: "silero-vad barge-in", status: "complete" },
          { name: "情绪识别（文本+语音）", description: "多模态融合", status: "complete" },
          { name: "SQLite 持久化", description: "用户/角色/会话/消息/记忆", status: "complete" },
          { name: "角色系统", description: "自定义角色卡 + 音色绑定", status: "complete" },
          { name: "知识库 RAG", description: "向量+FTS5 混合检索", status: "complete" },
          { name: "Skill 工具调用", description: "5 内置技能 + 审批机制", status: "complete" },
          { name: "长期记忆", description: "事件抽取 + 向量召回", status: "complete" },
          { name: "截屏/摄像头感知", description: "多模态输入支持", status: "complete" },
          { name: "模型管理中心", description: "显存检测 + 下载切换", status: "complete" },
          { name: "Live2D 角色形象", description: "接口预留，占位实现", status: "placeholder" }
        ]
      };
    }

    function renderDashboard() {
      if (!progressData) return;

      // 更新进度环
      const progressCircle = document.getElementById('progress-circle');
      const progressNumber = document.getElementById('progress-number');
      const circumference = 2 * Math.PI * 90;
      const offset = circumference - (progressData.overall_progress / 100) * circumference;
      
      setTimeout(() => {
        progressCircle.style.strokeDashoffset = offset;
      }, 500);

      // 数字动画
      animateNumber(progressNumber, 0, progressData.overall_progress, 2000);

      // 统计卡片
      const statsGrid = document.getElementById('stats-grid');
      statsGrid.innerHTML = `
        <div class="stat-card">
          <div class="stat-icon">🦀</div>
          <div class="stat-value">${progressData.statistics.rust_modules}</div>
          <div class="stat-label">Rust 模块</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">💚</div>
          <div class="stat-value">${progressData.statistics.vue_components}</div>
          <div class="stat-label">Vue 组件</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🐍</div>
          <div class="stat-value">${progressData.statistics.python_workers}</div>
          <div class="stat-label">Python Worker</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⚡</div>
          <div class="stat-value">${progressData.statistics.ipc_commands}</div>
          <div class="stat-label">IPC 命令</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🎯</div>
          <div class="stat-value">${progressData.statistics.skills}</div>
          <div class="stat-label">内置技能</div>
        </div>
      `;

      // Rust 模块
      renderModules('rust-modules', 'rust-count', progressData.modules.rust, '模块');

      // Vue 模块
      renderModules('vue-modules', 'vue-count', progressData.modules.vue, '组件');

      // Python 模块
      renderModules('python-modules', 'python-count', progressData.modules.python, '服务');

      // 功能清单
      renderFeatures();

      // 扫描时间
      const scanTime = new Date(progressData.scan_time);
      document.getElementById('scan-time').textContent = scanTime.toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    function renderModules(containerId, countId, moduleData, unit) {
      const container = document.getElementById(containerId);
      const countEl = document.getElementById(countId);
      
      countEl.textContent = `${moduleData.modules.length} ${unit}`;

      container.innerHTML = moduleData.modules.map(mod => `
        <div class="module-card">
          <div class="module-header">
            <div class="module-icon">${moduleData.icon}</div>
            <div class="module-name">${mod.name}</div>
            <div class="module-status"></div>
          </div>
          <div class="module-path">${moduleData.path}${mod.name}/</div>
          <div class="module-files">
            ${mod.files.slice(0, 5).map(f => `<span class="file-tag">${f}</span>`).join('')}
            ${mod.files.length > 5 ? `<span class="file-tag">+${mod.files.length - 5}</span>` : ''}
          </div>
        </div>
      `).join('');
    }

    function renderFeatures() {
      const container = document.getElementById('features-list');
      const countEl = document.getElementById('features-count');
      
      const complete = progressData.features.filter(f => f.status === 'complete').length;
      countEl.textContent = `${complete} / ${progressData.features.length}`;

      container.innerHTML = progressData.features.map(feature => `
        <div class="feature-item">
          <div class="feature-check ${feature.status}">
            ${feature.status === 'complete' ? '✓' : '◐'}
          </div>
          <div class="feature-info">
            <div class="feature-name">${feature.name}</div>
            <div class="feature-desc">${feature.description}</div>
          </div>
        </div>
      `).join('');
    }

    function animateNumber(element, start, end, duration) {
      const startTime = performance.now();
      
      function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const value = Math.floor(start + (end - start) * progress);
        element.textContent = value;
        
        if (progress < 1) {
          requestAnimationFrame(update);
        }
      }
      
      requestAnimationFrame(update);
    }

    // 初始加载
    loadData();

    // 每 30 秒自动刷新
    setInterval(loadData, 30000);
  </script>
</body>
