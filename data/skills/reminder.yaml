name: set_reminder
description: 设置提醒和日程。支持绝对时间和相对时间。当用户说"提醒我XX"、"XX时间叫我"、"30分钟后提醒我"、"明天早上9点叫我起床"等时使用。
parameters:
  - name: content
    type: string
    required: true
    description: 提醒内容（如 "开会"、"喝水"、"打电话给妈妈"）
  - name: fire_at
    type: string
    required: false
    description: 提醒时间（ISO 8601 格式，如 2026-07-08T14:30:00）。与 relative_time 二选一，优先使用 relative_time。
  - name: relative_time
    type: string
    required: false
    description: 相对时间描述（如 "in 30 minutes"、"in 2 hours"、"tomorrow 9am"、"next Monday 3pm"）。系统会根据当前时间自动计算 ISO 8601 时间。
  - name: repeat
    type: string
    required: false
    description: 重复周期（none/daily/weekly/monthly，默认 none）
executor:
  type: rust
  module: builtin
  function: set_reminder
permissions: []
approval_mode: always
